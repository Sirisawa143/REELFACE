<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>ReelFaces - Cast of Titanic</title>
</head>
<body>
 
    <nav class="navbar">
        <a class="logo" href="index.html">REEL<span>FACES</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html">Movies</a></li>
        </ul>
    </nav>
 
    <div class="page-header">
        <div class="movie-top-row">
            <a class="back-btn" href="m-titanic.html">&#8592; Back to Movie</a>
        </div>
        <div class="movie-overview">
            <div class="overview-left">
                <img src="D1.png" alt="Titanic"/>
            </div>
            <div class="overview-right">
                <div class="genre-tags">
                    <span class="genre-tag">Genre 1</span>
                    <span class="genre-tag">Genre 2</span>
                </div>
                <h1>Movie Title</h1>
                <div class="movie-meta">
                    <span class="star">&#9733; 0.0</span>
                    <span>Year</span>
                    <span>Country</span>
                    <span>Duration</span>
                </div>
            </div>
        </div>
    </div>
 
    <div class="scroll" id="scroll">
        <div class="cast-container">
 
            <div class="cast-card">
                <img src="cat1.avif" alt="Hercules">
                <div class="cast-info">
                    <div class="cast-name">Hercules</div>
                    <div class="cast-role">Actor Name</div>
                </div>
            </div>
 
            <div class="cast-card">
                <img src="cat2.avif" alt="Megara">
                <div class="cast-info">
                    <div class="cast-name">Megara</div>
                    <div class="cast-role">Actor Name</div>
                </div>
            </div>
 
            <div class="cast-card">
                <img src="cat3.avif" alt="Hades">
                <div class="cast-info">
                    <div class="cast-name">Hades</div>
                    <div class="cast-role">Actor Name</div>
                </div>
            </div>
 
            <div class="cast-card">
                <img src="cat4.avif" alt="Phil">
                <div class="cast-info">
                    <div class="cast-name">Phil</div>
                    <div class="cast-role">Actor Name</div>
                </div>
            </div>
 
            <div class="cast-card">
                <img src="cat5.avif" alt="Zeus">
                <div class="cast-info">
                    <div class="cast-name">Zeus</div>
                    <div class="cast-role">Actor Name</div>
                </div>
            </div>
 
        </div>
    </div>
 
    <script>
        // scrolls sideways when you use the mouse wheel
        var strip = document.getElementById('scroll');
        strip.addEventListener('wheel', function(e) {
            e.preventDefault();
            strip.scrollLeft += e.deltaY;
        });
    </script>
 
</body>
</html>
